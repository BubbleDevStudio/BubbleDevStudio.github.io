<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BubbleDevStudio | Technical Excellence</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
        
        body { background-color: #09090b; color: #f4f4f5; font-family: "Inter", sans-serif; }
        .font-mono { font-family: "JetBrains Mono", monospace; }
        .scanline {
            background: linear-gradient(to bottom, rgba(255, 255, 255, 0) 50%, rgba(255, 255, 255, 0.02) 50%);
            background-size: 100% 4px;
        }
        .hardware-border { border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5); }
        .red-glow:hover { box-shadow: 0 0 15px rgba(230, 0, 18, 0.4); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Иконки из Lucide
        const Icon = ({ name, className }) => {
            useEffect(() => {
                lucide.createIcons();
            }, []);
            return <i data-lucide={name} className={className}></i>;
        };

        const services = [
            {
                title: "Technical Porting",
                description: "Native Unity and C# optimization for the Nintendo Switch™ hardware. Full support for Joy-Con™ features, HD Rumble, and System Dialogue management.",
                icon: "cpu",
                tech: ["Unity", "C#", "Joy-Con API", "HD Rumble"]
            },
            {
                title: "Certification (LotCheck)",
                description: "Comprehensive pre-submission testing to ensure 100% compliance with Nintendo Technical Standards and Guidelines.",
                icon: "shield-check",
                tech: ["Compliance", "LotCheck", "QA"]
            },
            {
                title: "Performance Tuning",
                description: "Advanced GPU/CPU profiling to guarantee stable framerates in both Handheld (720p) and Docked (1080p) modes.",
                icon: "gauge",
                tech: ["Profiling", "720p/1080p", "Optimization"]
            },
            {
                title: "Publishing Support",
                description: "Operational management under FOP [Фамилия Мамы], providing a legal and financial framework for global eShop distribution.",
                icon: "globe",
                tech: ["eShop", "Global Distro", "Legal"]
            }
        ];

        function App() {
            return (
                <div className="min-h-screen bg-[#09090b] text-zinc-100 selection:bg-[#e60012] selection:text-white overflow-x-hidden">
                    <div className="fixed inset-0 pointer-events-none scanline opacity-20 z-50"></div>
                    <div className="fixed top-[-10%] left-[-10%] w-[40%] h-[40%] bg-[#e60012] rounded-full blur-[120px] opacity-10 pointer-events-none"></div>
                    
                    <main className="relative max-w-5xl mx-auto px-6 py-12 md:py-24">
                        <header className="mb-20">
                            <div className="flex items-center gap-3 mb-6">
                                <div className="w-12 h-1 bg-[#e60012]"></div>
                                <span className="font-mono text-xs tracking-widest uppercase text-zinc-500">Technical Excellence // Switch Development</span>
                            </div>
                            <h1 className="text-5xl md:text-7xl font-bold tracking-tighter mb-4">
                                BubbleDev<span className="text-[#e60012]">Studio</span>
                            </h1>
                            <p className="text-xl md:text-2xl text-zinc-400 font-light max-w-2xl leading-relaxed">
                                Official Console Development & Technical Optimization for the Nintendo Switch™ Ecosystem.
                            </p>
                        </header>

                        <section className="mb-32 relative pl-8 border-l-2 border-[#e60012]">
                            <h2 className="font-mono text-sm uppercase tracking-[0.2em] text-[#e60012] mb-6 flex items-center gap-2">
                                <Icon name="terminal" className="w-4 h-4" /> Mission_Statement
                            </h2>
                            <blockquote className="text-2xl md:text-4xl font-medium italic text-zinc-200 leading-tight">
                                "To bridge the gap between ambitious independent developers and the premium Nintendo Switch™ ecosystem through technical precision and operational stability."
                            </blockquote>
                        </section>

                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6 mb-32">
                            {services.map((s) => (
                                <div key={s.title} className="group p-8 bg-[#18181b] border border-white/5 rounded-2xl hardware-border transition-all hover:border-[#e60012]/30 red-glow">
                                    <div className="mb-6 p-3 bg-zinc-900 w-fit rounded-xl">
                                        <Icon name={s.icon} className="w-6 h-6 text-[#e60012]" />
                                    </div>
                                    <h3 className="text-xl font-bold mb-3 flex items-center gap-2">
                                        {s.title} <Icon name="chevron-right" className="w-4 h-4 text-zinc-700" />
                                    </h3>
                                    <p className="text-zinc-400 text-sm leading-relaxed mb-6">{s.description}</p>
                                    <div className="flex flex-wrap gap-2">
                                        {s.tech.map(t => (
                                            <span key={t} className="font-mono text-[10px] px-2 py-1 bg-zinc-900 border border-white/5 rounded text-zinc-500 uppercase">{t}</span>
                                        ))}
                                    </div>
                                </div>
                            ))}
                        </div>

                        <footer className="border-t border-white/5 pt-12 pb-24 flex flex-col md:flex-row justify-between items-center gap-8">
                            <div className="text-center md:text-left">
                                <p className="font-bold text-zinc-200">BubbleDevStudio</p>
                                <p className="text-xs text-zinc-500 max-w-xs leading-relaxed">Partnering with independent creators worldwide.</p>
                            </div>
                            <div className="text-center md:text-right">
                                <p className="text-xs text-zinc-500">&copy; 2026 BubbleDevStudio. Registered in Ukraine (FOP).</p>
                                <div className="flex justify-center md:justify-end gap-4 text-[10px] font-mono text-zinc-600 uppercase mt-2">
                                    <span>Privacy</span><span>Terms</span><span>Contact</span>
                                </div>
                            </div>
                        </footer>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
